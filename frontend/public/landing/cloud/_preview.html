<!doctype html><html><head><meta charset="utf-8"><style>
body{margin:0;background:#F0EDE6;font-family:system-ui;padding:24px}
h1{font-size:14px;letter-spacing:.06em;text-transform:uppercase;color:#6B6760;margin:0 0 16px;font-weight:500}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;max-width:920px}
.cell{background:#fff;border:1px solid rgba(26,26,24,.08);border-radius:12px;padding:18px;display:flex;flex-direction:column;align-items:center;gap:10px}
.cell img{display:block;height:80px;width:auto}
.cell span{font-size:11px;color:#6B6760}
</style></head><body>
<h1>NexoLeal · Hero cloud · v2 (16 items)</h1>
<div class="grid">
<div class="cell"><img src="loyalty-card.svg"><span>loyalty-card</span></div>
<div class="cell"><img src="stamp-cluster.svg"><span>stamp-cluster</span></div>
<div class="cell"><img src="qr-code.svg"><span>qr-code</span></div>
<div class="cell"><img src="whatsapp-bubble.svg"><span>whatsapp-bubble</span></div>
<div class="cell"><img src="phone-wallet.svg"><span>phone-wallet</span></div>
<div class="cell"><img src="dashboard-tile.svg"><span>dashboard-tile</span></div>
<div class="cell"><img src="segment-ring.svg"><span>segment-ring</span></div>
<div class="cell"><img src="retention-arc.svg"><span>retention-arc</span></div>
<div class="cell"><img src="peso-coin.svg"><span>peso-coin</span></div>
<div class="cell"><img src="ticket.svg"><span>ticket</span></div>
<div class="cell"><img src="heart-check.svg"><span>heart-check</span></div>
<div class="cell"><img src="confetti-burst.svg"><span>confetti-burst</span></div>
<div class="cell"><img src="gift-box.svg"><span>gift-box (new)</span></div>
<div class="cell"><img src="sparkle.svg"><span>sparkle (new)</span></div>
<div class="cell"><img src="star-rating.svg"><span>star-rating (new)</span></div>
<div class="cell"><img src="return-arrow.svg"><span>return-arrow (new)</span></div>
</div></body></html>
