name = "nexoleal-backend"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── KV Namespaces (dev / default) ───────────────────────────────────────────
[[kv_namespaces]]
binding = "TOKEN_BLACKLIST"
id = "5d4fb7d450ec41ee90894eda78ddbe9e"
preview_id = "392896c610434456bedaab463e0496de"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "7599c9c50d97401a9537cf4a70ba3cdc"
preview_id = "aa2675b32dad4e9ea55d09f869dc2994"

[[kv_namespaces]]
binding = "ANALYTICS_CACHE"
id = "a79f587953124bc3a2615aa88ae90723"
preview_id = "449fdbc534af4dd79affb336b02fffe3"

# ─── Default Vars ────────────────────────────────────────────────────────────
[vars]
FRONTEND_ORIGIN = "http://localhost:8080,http://localhost:5173,http://localhost:3000,https://tanstack-start-app.nexoleal.workers.dev"
TOKEN_TTL_SECONDS = "90"
RATE_LIMIT_WINDOW_SECONDS = "60"
RATE_LIMIT_MAX_REQUESTS = "60"

# ─── Cron Triggers ───────────────────────────────────────────────────────────
# Daily 03:00 UTC — recalculate client_business_loyalty.status
# (active / at_risk / lost) based on last_visit_at recency. See src/cron.ts.
[triggers]
crons = ["0 3 * * *"]

# ─── Staging Environment ─────────────────────────────────────────────────────
[env.staging]
name = "nexoleal-backend-staging"
vars = { FRONTEND_ORIGIN = "https://staging.nexoleal.com,https://tanstack-start-app.nexoleal.workers.dev", TOKEN_TTL_SECONDS = "90", RATE_LIMIT_WINDOW_SECONDS = "60", RATE_LIMIT_MAX_REQUESTS = "60" }

[[env.staging.kv_namespaces]]
binding = "TOKEN_BLACKLIST"
id = "554ef1d173dc4f648b9d96eae57c990a"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT"
id = "761fc784301540c6ab715f66cada25a8"

[[env.staging.kv_namespaces]]
binding = "ANALYTICS_CACHE"
id = "24d49e316ab54ba19606ac3ba02163b7"

[env.staging.triggers]
crons = ["0 3 * * *"]

# Production deploys use the default worker above (name = "nexoleal-backend").
# CI and manual deploy both run: npm run deploy / wrangler deploy
# The duplicate nexoleal-backend-production worker can be deleted in Cloudflare dashboard.
